<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chroma Diaries - Under Maintenance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
 <link rel="icon" type="image/png" sizes="32x32" href="img/white.png">
<link rel="apple-touch-icon" href="img/white.png">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #ffffff, #e6f0ff, #cce0ff);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.logo {
    font-size: 32px;
    font-weight: bold;
    color: #007bff;
    margin-bottom: 10px;
}

h2 {
    color: #333;
    margin-bottom: 10px;
}

p {
    color: #666;
    margin-bottom: 20px;
}

form input,
form textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

form input:focus,
form textarea:focus {
    border-color: #007bff;
    box-shadow: 0 0 5px rgba(0,123,255,0.3);
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #007bff, #3399ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: linear-gradient(135deg, #0056b3, #007bff);
}

.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #999;
}
</style>

</head>

<body>

<div class="container">
    <div class="logo">Chromadiaries</div>
    
    <h2>🚧 Under Maintenance</h2>
    <p>We’re upgrading your experience. Stay tuned ✨</p>

    <form id="feedbackForm">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email">
    <textarea id="feedback" rows="4" placeholder="Your Feedback" required></textarea>
    <button type="submit">Send Feedback</button>
</form>

<p id="status" style="display:none; margin-top:10px; font-weight:500;"></p>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwl5JT-fvxhMBTrj4SW_yzlnMuIeUFF0a2vFNmPby4JSmYyUYAcHlaRN47fY6D1i7HV0w/exec";

const form = document.getElementById("feedbackForm");
const status = document.getElementById("status");
const button = form.querySelector("button");

form.addEventListener("submit", e => {
    e.preventDefault();

    // Disable button + show loading
    button.innerText = "Sending...";
    button.disabled = true;

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        feedback: document.getElementById("feedback").value
    };

    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(response => {

        // Show success message
        status.style.display = "block";
        status.style.color = "green";
        status.innerText = "✅ Feedback sent successfully!";

        // Reset form
        form.reset();

        // Reset button
        button.innerText = "Send Feedback";
        button.disabled = false;

        // Auto hide after 3 sec
        setTimeout(() => {
            status.style.display = "none";
        }, 3000);
    })
    .catch(error => {

        status.style.display = "block";
        status.style.color = "red";
        status.innerText = "❌ Error sending feedback!";

        button.innerText = "Send Feedback";
        button.disabled = false;
    });
});
</script>


    <div class="footer">© 2026 Chromadiaries</div>
</div>

</body>
</html>
